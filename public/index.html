<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer type="module" src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="container mx-auto p-4 flex flex-col items-center">
        <h1 class="text-2xl font-bold mb-4">The Guards and the Doors</h1>
        <p class="text-gray-700">Find the correct door by questioning the guards. One speaks the truth, the other lies.</p>
        <div class="flex flex-row justify-center w-full">
            <div>
                <img id="door1" src="img/Door.png" alt="Doors" class="w-48 h-auto mt-4 hover:scale-105 transition-transform duration-300 cursor-pointer border-4 border-transparent hover:border-yellow-400">
                <p class="text-center mt-2">Door 1</p>
            </div>
            <div>
                <img id="door2" src="img/Door.png" alt="Doors" class="w-48 h-auto mt-4 hover:scale-105 transition-transform duration-300 cursor-pointer border-4 border-transparent hover:border-yellow-400">
                <p class="text-center mt-2">Door 2</p>
            </div>
            <div>
                <img id="door3" src="img/Door.png" alt="Doors" class="w-48 h-auto mt-4 hover:scale-105 transition-transform duration-300 cursor-pointer border-4 border-transparent hover:border-yellow-400">
                <p class="text-center mt-2">Door 3</p>
            </div>
            <div>
                <img id="door4" src="img/Door.png" alt="Doors" class="w-48 h-auto mt-4 hover:scale-105 transition-transform duration-300 cursor-pointer border-4 border-transparent hover:border-yellow-400">
                <p class="text-center mt-2">Door 4</p>
            </div>
            <div>
                <img id="door5" src="img/Door.png" alt="Doors" class="w-48 h-auto mt-4 hover:scale-105 transition-transform duration-300 cursor-pointer border-4 border-transparent hover:border-yellow-400">
                <p class="text-center mt-2">Door 5</p>
            </div>
        </div>
        <form class="w-full max-w-sm mt-4">
            <div class="flex items-center border-b border-teal-500 py-2">
                <button class="shrink-0 bg-teal-500 hover:bg-teal-700 border-teal-500 hover:border-teal-700 text-sm border-4 text-white py-1 px-2 rounded" type="button" id="sendButton1">Ask Guard 1</button>
                
                <input class="appearance-none bg-transparent border-none w-full text-gray-700 mr-3 py-1 px-2 leading-tight focus:outline-none" type="text" placeholder="Type your message..." aria-label="Message" id ="messageInput">
                
                <button class="shrink-0 bg-teal-500 hover:bg-teal-700 border-teal-500 hover:border-teal-700 text-sm border-4 text-white py-1 px-2 rounded ml-2" type="button" id="sendButton2">Ask Guard 2</button>
            </div>
        </form>
        <div class="w-full max-w-sm mt-4 p-4 rounded bg-gray-50 border border-gray-200">
            <p id="statusMessage" class="text-gray-700 mb-2">Ask a guard about the correct door location, then select a door and confirm your guess.</p>
            <div class="flex items-center gap-2 mb-2">
                <button id="confirmButton" class="shrink-0 bg-blue-500 hover:bg-blue-700 border-blue-500 hover:border-blue-700 text-sm border-4 text-white py-1 px-2 rounded" type="button">Confirm guess</button>
                <span id="selectedDoorText" class="text-sm text-gray-600">No door selected yet.</span>
            </div>
            <div class="text-sm text-gray-600">
                Total tokens used: <span id="totalTokens">0</span>
            </div>
        </div>
        <div class ="flex flex-row justify-center w-full">
            <div id="chatContainer1" class="w-full max-w-sm mt-4 p-4 border rounded m-2">
            <!-- Chat messages will appear here -->
            </div>
            <div id="chatContainer2" class="w-full max-w-sm mt-4 p-4 border rounded m-2">
            <!-- Chat messages will appear here -->
            </div>
        </div>
        <button class="shrink-0 bg-red-500 hover:bg-red-700 border-red-500 hover:border-red-700 text-sm border-4 text-white py-1 px-2 rounded mt-4" type="button" id="restartButton">Restart</button>
    </div>
</body>
</html>
